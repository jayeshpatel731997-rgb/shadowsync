name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install ".[dev]"
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: shadowsync:local
      - name: Start offline Compose stack
        run: docker compose up --detach --no-build
      - name: Smoke test Compose service
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/api/health; then exit 0; fi
            sleep 1
          done
          docker compose logs shadowsync
          exit 1
      - name: Stop Compose stack
        if: always()
        run: docker compose down --volumes
